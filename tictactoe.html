<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.2rem;
      margin-bottom: 0.4rem;
      letter-spacing: 2px;
      color: #e94560;
    }

    #status {
      font-size: 1.1rem;
      margin-bottom: 1.4rem;
      min-height: 1.5rem;
      color: #a8dadc;
      letter-spacing: 0.5px;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 10px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
      border: 2px solid #0f3460;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.04);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      border-color: #e94560;
      animation: pulse 0.5s ease;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    #reset {
      margin-top: 1.8rem;
      padding: 0.65rem 2.2rem;
      font-size: 1rem;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.2s, transform 0.1s;
    }

    #reset:hover {
      background: #c73652;
      transform: scale(1.04);
    }

    #title-wrap {
      position: relative;
      display: flex;
      align-items: center;
      margin-bottom: 0.4rem;
    }

    #fireworks {
      position: absolute;
      left: 100%;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      width: 180px;
      height: 120px;
    }

    #score {
      display: flex;
      gap: 2.5rem;
      margin-bottom: 1.4rem;
      font-size: 1rem;
    }

    .score-box {
      text-align: center;
    }

    .score-box .label { color: #888; font-size: 0.8rem; letter-spacing: 1px; text-transform: uppercase; }
    .score-box .value { font-size: 1.8rem; font-weight: bold; }
    .score-box.x-score .value { color: #e94560; }
    .score-box.o-score .value { color: #a8dadc; }
    .score-box.draw-score .value { color: #f5a623; }
  </style>
</head>
<body>
  <div id="title-wrap">
    <h1>Tic Tac Toe</h1>
    <canvas id="fireworks" width="180" height="120"></canvas>
  </div>

  <div id="score">
    <div class="score-box x-score">
      <div class="label">X Wins</div>
      <div class="value" id="score-x">0</div>
    </div>
    <div class="score-box draw-score">
      <div class="label">Draws</div>
      <div class="value" id="score-draw">0</div>
    </div>
    <div class="score-box o-score">
      <div class="label">O Wins</div>
      <div class="value" id="score-o">0</div>
    </div>
  </div>

  <div id="status">X's turn</div>

  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <button id="reset">New Game</button>

  <script>
    const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

    let board, current, over;
    const scores = { X: 0, O: 0, D: 0 };

    const cells = document.querySelectorAll('.cell');
    const status = document.getElementById('status');
    const scoreX = document.getElementById('score-x');
    const scoreO = document.getElementById('score-o');
    const scoreDraw = document.getElementById('score-draw');

    function init() {
      board = Array(9).fill('');
      current = 'X';
      over = false;
      cells.forEach(c => {
        c.textContent = '';
        c.className = 'cell';
      });
      status.textContent = "X's turn";
    }

    function checkWinner() {
      for (const [a, b, c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return { winner: board[a], line: [a, b, c] };
        }
      }
      if (board.every(v => v)) return { winner: null, line: [] };
      return null;
    }

    cells.forEach(cell => {
      cell.addEventListener('click', () => {
        const i = +cell.dataset.i;
        if (over || board[i]) return;

        board[i] = current;
        cell.textContent = current;
        cell.classList.add('taken', current.toLowerCase());

        const result = checkWinner();
        if (result) {
          over = true;
          if (result.winner) {
            result.line.forEach(idx => cells[idx].classList.add('win'));
            status.textContent = `${result.winner} wins!`;
            scores[result.winner]++;
          } else {
            status.textContent = "It's a draw!";
            scores.D++;
          }
          scoreX.textContent = scores.X;
          scoreO.textContent = scores.O;
          scoreDraw.textContent = scores.D;
          if ((scores.X === 7 && scores.O === 6) || (scores.X === 6 && scores.O === 7)) launchFireworks();
        } else {
          current = current === 'X' ? 'O' : 'X';
          status.textContent = `${current}'s turn`;
        }
      });
    });

    document.getElementById('reset').addEventListener('click', init);

    // Fireworks
    const fwCanvas = document.getElementById('fireworks');
    const fwCtx = fwCanvas.getContext('2d');
    let particles = [];
    let fwAnim = null;

    function launchFireworks() {
      for (let burst = 0; burst < 5; burst++) {
        setTimeout(() => spawnBurst(), burst * 220);
      }
    }

    function spawnBurst() {
      const cx = 30 + Math.random() * 120;
      const cy = 15 + Math.random() * 70;
      const colors = ['#e94560','#a8dadc','#f5a623','#fff','#c8f7c5','#f9ca24'];
      const color = colors[Math.floor(Math.random() * colors.length)];
      for (let i = 0; i < 28; i++) {
        const angle = (i / 28) * Math.PI * 2;
        const speed = 1.5 + Math.random() * 2.5;
        particles.push({
          x: cx, y: cy,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          alpha: 1,
          color,
          size: 2 + Math.random() * 2
        });
      }
      if (!fwAnim) fwAnim = requestAnimationFrame(drawFW);
    }

    function drawFW() {
      fwCtx.clearRect(0, 0, fwCanvas.width, fwCanvas.height);
      particles.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.04;
        p.alpha -= 0.018;
        fwCtx.globalAlpha = Math.max(0, p.alpha);
        fwCtx.fillStyle = p.color;
        fwCtx.beginPath();
        fwCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        fwCtx.fill();
      });
      fwCtx.globalAlpha = 1;
      particles = particles.filter(p => p.alpha > 0);
      if (particles.length > 0) {
        fwAnim = requestAnimationFrame(drawFW);
      } else {
        fwAnim = null;
        fwCtx.clearRect(0, 0, fwCanvas.width, fwCanvas.height);
      }
    }

    init();
  </script>
</body>
</html>
